<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <title>เข้าสู่ระบบด้วย Telegram</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: #111118;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.07);
      max-width: 360px;
      width: 90%;
    }
    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    h2 { color: #f0f0f5; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .sub { color: #7a7a8a; font-size: 0.82rem; margin-bottom: 1.75rem; line-height: 1.5; }

    .widget-area {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      min-height: 48px;
      align-items: center;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2AABEE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-msg  { font-size: 0.85rem; color: #7a7a8a; }
    .state-title { color: #f0f0f5; font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; }

    button.close-btn {
      background: #2AABEE;
      border: none;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.875rem;
      margin-top: 1.25rem;
      font-family: inherit;
    }
    button.close-btn:hover { background: #1a90cc; }

    .note {
      margin-top: 1.25rem;
      font-size: 0.7rem;
      color: #3d3d50;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">✈</div>
  <h2>เข้าสู่ระบบด้วย Telegram</h2>
  <p class="sub">กดปุ่มด้านล่างและอนุมัติผ่านแอป Telegram ของคุณ</p>

  <!-- Telegram Login Widget จะถูก inject ที่นี่ -->
  <div class="widget-area" id="widgetArea">
    <div class="spinner" id="loadingSpinner"></div>
  </div>

  <p class="note">ข้อมูลจะถูกส่งกลับไปยังหน้าสมัครสมาชิกโดยอัตโนมัติ</p>
</div>

<script>
(function () {
  'use strict';

  // ── อ่าน bot username จาก query string ──────────────────────────────────
  const params      = new URLSearchParams(window.location.search);
  const botUsername = params.get('bot');   // ชื่อ bot ไม่มี @
  const origin      = params.get('origin') || window.location.origin;

if (!botUsername) {
  showError(
    'ยังไม่ได้ตั้งค่า Bot Username',
    'กรุณาแก้ไข TELEGRAM_BOT_USERNAME'
  );
  return;
}

  // ── รับข้อมูลจาก Telegram widget callback ────────────────────────────────
  // Telegram จะเรียก window.onTelegramAuth(user) เมื่อผู้ใช้ login สำเร็จ
  window.onTelegramAuth = function (user) {
    console.log('[TG Popup] Auth success:', user);
    sendToOpener(user);
  };

  // ── สร้าง Telegram Login Widget ──────────────────────────────────────────
  function injectWidget() {
    const area   = document.getElementById('widgetArea');
    const script = document.createElement('script');

    script.async             = true;
    script.src               = 'https://telegram.org/js/telegram-widget.js?22';
    script.setAttribute('data-telegram-login',   botUsername);
    script.setAttribute('data-size',             'large');
    script.setAttribute('data-radius',           '10');
    script.setAttribute('data-onauth',           'onTelegramAuth(user)');
    script.setAttribute('data-request-access',   'write');

    // ซ่อน spinner เมื่อ widget โหลดเสร็จ
    script.onload = () => {
      const spinner = document.getElementById('loadingSpinner');
      if (spinner) spinner.style.display = 'none';
    };
    script.onerror = () => showError('โหลด Telegram Widget ไม่ได้', 'กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');

    area.appendChild(script);
  }

  // ── ส่งข้อมูลกลับ opener (register.html) ─────────────────────────────────
  function sendToOpener(user) {
    showSuccess(user);

    const openerWin = window.opener;

    // วิธีที่ 1: เรียกฟังก์ชันโดยตรง (same-origin)
    try {
      if (openerWin && !openerWin.closed && typeof openerWin.handleTelegramCallback === 'function') {
        openerWin.handleTelegramCallback(user);
        setTimeout(() => window.close(), 1200);
        return;
      }
    } catch (_) { /* cross-origin — ใช้ postMessage แทน */ }

    // วิธีที่ 2: postMessage
    try {
      if (openerWin && !openerWin.closed) {
        openerWin.postMessage({ type: 'TELEGRAM_LOGIN_SUCCESS', user }, origin);
        setTimeout(() => window.close(), 1200);
        return;
      }
    } catch (e) {
      console.error('[TG Popup] postMessage failed:', e);
    }

    // ถ้าไม่มี opener: เก็บใน sessionStorage แล้ว redirect กลับ
    sessionStorage.setItem('tg_auth_result', JSON.stringify(user));
    window.location.href = '/register.html?tg_callback=1';
  }

  // ── UI States ────────────────────────────────────────────────────────────
  function showSuccess(user) {
    const name = [user.first_name, user.last_name].filter(Boolean).join(' ') || user.username || 'ผู้ใช้';
    document.getElementById('card').innerHTML = `
      <div class="state-icon">✅</div>
      <div class="state-title">เข้าสู่ระบบสำเร็จ!</div>
      <p class="state-msg">ยินดีต้อนรับ <strong>${escHtml(name)}</strong><br>กำลังส่งข้อมูลกลับ...</p>
    `;
  }

  function showError(title, msg) {
    document.getElementById('card').innerHTML = `
      <div class="state-icon">❌</div>
      <div class="state-title">${escHtml(title)}</div>
      <p class="state-msg">${escHtml(msg)}</p>
      <button class="close-btn" onclick="window.close()">ปิดหน้าต่าง</button>
    `;
  }

  function escHtml(str) {
    return (str || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  // ── รองรับ sessionStorage fallback (ถ้าถูกเปิดโดยไม่มี opener) ───────────
  function checkSessionFallback() {
    const stored = sessionStorage.getItem('tg_auth_result');
    if (stored) {
      try {
        const user = JSON.parse(stored);
        sessionStorage.removeItem('tg_auth_result');
        if (user && user.id && typeof window.handleTelegramCallback === 'function') {
          window.handleTelegramCallback(user);
        }
      } catch (_) {}
    }
  }

  // ── Start ────────────────────────────────────────────────────────────────
  injectWidget();

  // ถ้าหน้านี้เปิดในฐานะหน้าหลัก (ไม่ใช่ popup) ให้ตรวจสอบ sessionStorage
  if (!window.opener) {
    document.addEventListener('DOMContentLoaded', checkSessionFallback);
  }
})();
</script>
</body>
</html>
