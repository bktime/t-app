<!DOCTYPE html>
<html lang="th-TH">
<head>
  <meta charset="UTF-8">
  <title>เข้าสู่ระบบด้วย Telegram</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: #111118;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.07);
      max-width: 360px;
      width: 90%;
    }
    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    h2 { color: #f0f0f5; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .sub { color: #7a7a8a; font-size: 0.82rem; margin-bottom: 1.75rem; line-height: 1.5; }

    .widget-area {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      min-height: 48px;
      align-items: center;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2AABEE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-msg  { font-size: 0.85rem; color: #7a7a8a; }
    .state-title { color: #f0f0f5; font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; }

    button.close-btn {
      background: #2AABEE;
      border: none;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.875rem;
      margin-top: 1.25rem;
      font-family: inherit;
    }
    button.close-btn:hover { background: #1a90cc; }

    .note {
      margin-top: 1.25rem;
      font-size: 0.7rem;
      color: #3d3d50;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">✈</div>
  <h2 id="pageTitle">เข้าสู่ระบบด้วย Telegram</h2>
  <p class="sub" id="pageSub">กดปุ่มด้านล่างและอนุมัติผ่านแอป Telegram ของคุณ</p>

  <!-- Telegram Login Widget จะถูก inject ที่นี่ -->
  <div class="widget-area" id="widgetArea">
    <div class="spinner" id="loadingSpinner"></div>
  </div>

  <p class="note">ข้อมูลจะถูกส่งกลับไปยังหน้าเดิมโดยอัตโนมัติ</p>
</div>

<script>
(function () {
  'use strict';

  // ── อ่าน query string ────────────────────────────────────────────────────
  // ?bot=MyBotName  — ชื่อ bot ไม่มี @  (จำเป็น)
  // ?page=register|login|profile        (default: register)
  // ?origin=https://example.com         (สำหรับ postMessage; default: location.origin)
  const params      = new URLSearchParams(window.location.search);
  const botUsername = params.get('bot');
  const page        = (params.get('page') || 'register').toLowerCase();  // register | login | profile
  const origin      = params.get('origin') || window.location.origin;

  // Map page → fallback redirect path
  const REDIRECT = {
    register : '/register.html?tg_callback=1',
    login    : '/login.html?tg_callback=1',
    profile  : '/profile.html?tg_callback=1',
  };
  const fallbackPath = REDIRECT[page] || REDIRECT.register;

  // Map page → UI text
  const UI_TEXT = {
    register : { title: 'สมัครสมาชิกด้วย Telegram',   sub: 'กดปุ่มด้านล่างและอนุมัติผ่านแอป Telegram ของคุณ' },
    login    : { title: 'เข้าสู่ระบบด้วย Telegram',    sub: 'กดปุ่มด้านล่างและอนุมัติผ่านแอป Telegram ของคุณ' },
    profile  : { title: 'เชื่อมต่อ Telegram',           sub: 'กดปุ่มด้านล่างเพื่อเชื่อมบัญชี Telegram กับโปรไฟล์ของคุณ' },
  };
  const uiText = UI_TEXT[page] || UI_TEXT.register;
  document.getElementById('pageTitle').textContent = uiText.title;
  document.getElementById('pageSub').textContent   = uiText.sub;

  // ── ตรวจสอบ bot username ─────────────────────────────────────────────────
  if (!botUsername) {
    showError('ยังไม่ได้ตั้งค่า Bot Username', 'กรุณาแก้ไข TELEGRAM_BOT_USERNAME');
    return;
  }

  // ── Telegram widget callback ─────────────────────────────────────────────
  // Telegram จะเรียก window.onTelegramAuth(user) เมื่อ login สำเร็จ
  window.onTelegramAuth = function (user) {
    console.log('[TG Popup] Auth success:', user);
    sendToOpener(user);
  };

  // ── สร้าง Telegram Login Widget ─────────────────────────────────────────
  function injectWidget() {
    const area   = document.getElementById('widgetArea');
    const script = document.createElement('script');

    script.async = true;
    script.src   = 'https://telegram.org/js/telegram-widget.js?22';
    script.setAttribute('data-telegram-login', botUsername);
    script.setAttribute('data-size',           'large');
    script.setAttribute('data-radius',         '10');
    script.setAttribute('data-onauth',         'onTelegramAuth(user)');
    script.setAttribute('data-request-access', 'write');

    script.onload  = () => {
      const spinner = document.getElementById('loadingSpinner');
      if (spinner) spinner.style.display = 'none';
    };
    script.onerror = () => showError('โหลด Telegram Widget ไม่ได้', 'กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');

    area.appendChild(script);
  }

  // ── ส่งข้อมูลกลับ opener ─────────────────────────────────────────────────
  // postMessage payload:
  //   { type: 'TELEGRAM_LOGIN_SUCCESS', user: {...}, page: 'login'|'register'|'profile' }
  //
  // opener ของแต่ละหน้าควรฟัง:
  //   window.addEventListener('message', (e) => {
  //     if (e.data?.type === 'TELEGRAM_LOGIN_SUCCESS' && e.data?.page === 'profile') { ... }
  //   });
  //
  // หรือใช้ฟังก์ชัน handleTelegramCallback(user, page) / handleTelegramCallback(user) ก็ได้
  function sendToOpener(user) {
    showSuccess(user);

    const openerWin = window.opener;

    // วิธีที่ 1: เรียกฟังก์ชันโดยตรง (same-origin)
    try {
      if (openerWin && !openerWin.closed && typeof openerWin.handleTelegramCallback === 'function') {
        openerWin.handleTelegramCallback(user, page);
        setTimeout(() => window.close(), 1200);
        return;
      }
    } catch (_) { /* cross-origin — ข้ามไป postMessage */ }

    // วิธีที่ 2: postMessage (same-origin หรือ cross-origin)
    try {
      if (openerWin && !openerWin.closed) {
        openerWin.postMessage({ type: 'TELEGRAM_LOGIN_SUCCESS', user, page }, origin);
        setTimeout(() => window.close(), 1200);
        return;
      }
    } catch (e) {
      console.error('[TG Popup] postMessage failed:', e);
    }

    // วิธีที่ 3: ไม่มี opener → เก็บใน sessionStorage แล้ว redirect
    sessionStorage.setItem('tg_auth_result', JSON.stringify({ user, page }));
    window.location.href = fallbackPath;
  }

  // ── UI States ─────────────────────────────────────────────────────────────
  function showSuccess(user) {
    const name = [user.first_name, user.last_name].filter(Boolean).join(' ') || user.username || 'ผู้ใช้';
    const msg  = page === 'profile'
      ? 'เชื่อมต่อบัญชีสำเร็จ!'
      : 'เข้าสู่ระบบสำเร็จ!';
    document.getElementById('card').innerHTML = `
      <div class="state-icon">✅</div>
      <div class="state-title">${escHtml(msg)}</div>
      <p class="state-msg">ยินดีต้อนรับ <strong>${escHtml(name)}</strong><br>กำลังส่งข้อมูลกลับ...</p>
    `;
  }

  function showError(title, msg) {
    document.getElementById('card').innerHTML = `
      <div class="state-icon">❌</div>
      <div class="state-title">${escHtml(title)}</div>
      <p class="state-msg">${escHtml(msg)}</p>
      <button class="close-btn" onclick="window.close()">ปิดหน้าต่าง</button>
    `;
  }

  function escHtml(str) {
    return (str || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  // ── sessionStorage fallback ───────────────────────────────────────────────
  // ใช้เมื่อหน้านี้ถูกเปิดโดยตรง (ไม่ใช่ popup) เช่น หลัง redirect กลับมา
  function checkSessionFallback() {
    const stored = sessionStorage.getItem('tg_auth_result');
    if (!stored) return;
    try {
      const { user, page: storedPage } = JSON.parse(stored);
      sessionStorage.removeItem('tg_auth_result');
      if (user && user.id && typeof window.handleTelegramCallback === 'function') {
        window.handleTelegramCallback(user, storedPage || page);
      }
    } catch (_) {}
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  injectWidget();

  if (!window.opener) {
    document.addEventListener('DOMContentLoaded', checkSessionFallback);
  }
})();
</script>
</body>
</html>
