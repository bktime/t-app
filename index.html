<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลาปฏิบัติงาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 2rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 30px rgba(99,102,241,0.3);
    }
    h1 {
      color: white;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    .subtitle {
      color: #a0a0b0;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    
    /* User Info Section */
    .user-section {
      margin-bottom: 2rem;
    }
    .user-card {
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1));
      border-radius: 24px;
      padding: 1rem;
      border: 1px solid rgba(99,102,241,0.3);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .user-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #6366f1;
    }
    .user-details {
      flex: 1;
      text-align: left;
    }
    .user-name {
      color: white;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .user-email {
      color: #a0a0b0;
      font-size: 0.8rem;
    }
    .user-role {
      display: inline-block;
      background: rgba(99,102,241,0.2);
      color: #a855f7;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      margin-top: 0.25rem;
    }
    
    /* Main Action Buttons */
    .main-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .btn {
      padding: 1rem;
      border-radius: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      font-family: 'Noto Sans Thai', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(99,102,241,0.4);
    }
    .btn-outline {
      border: 1px solid rgba(99,102,241,0.5);
      color: #6366f1;
      background: transparent;
    }
    .btn-outline:hover {
      background: rgba(99,102,241,0.1);
      border-color: #6366f1;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: rgba(220,38,38,0.15);
      color: #ef4444;
      border: 1px solid rgba(220,38,38,0.3);
    }
    .btn-danger:hover {
      background: rgba(220,38,38,0.25);
      border-color: #ef4444;
      transform: translateY(-2px);
    }
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(16,185,129,0.4);
    }
    .btn-info {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }
    .btn-info:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
    }
    .btn-warning {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }
    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(245,158,11,0.4);
    }
    
    /* Divider */
    .divider {
      margin: 1.5rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    
    /* Auth Buttons (ไม่ login) */
    .auth-buttons {
      display: flex;
      gap: 1rem;
      flex-direction: column;
    }
    .auth-buttons .btn {
      justify-content: center;
    }
    
    /* Toast Notification */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #2ecc71;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
    }
    .toast.error {
      background: #e74c3c;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    /* Loading State */
    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="text-align: center;">
        <div class="logo"><i class="fas fa-clock-rotate-left"></i></div>
        <h1>ระบบลงเวลาปฏิบัติงาน</h1>
        <p class="subtitle">Time & Attendance Management System</p>
      </div>
      
      <!-- Section: เมื่อยังไม่ Login -->
      <div id="authSection">
        <div class="auth-buttons">
          <a href="login.html" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ</a>
          <a href="register.html" class="btn btn-outline"><i class="fas fa-user-plus"></i> สมัครสมาชิก</a>
        </div>
      </div>
      
      <!-- Section: เมื่อ Login แล้ว -->
      <div id="appSection" style="display: none;">
        <!-- User Info -->
        <div class="user-section">
          <div class="user-card">
            <div class="user-info">
              <img id="userAvatar" class="user-avatar" src="" alt="avatar">
              <div class="user-details">
                <div class="user-name" id="userName">-</div>
                <div class="user-email" id="userEmail">-</div>
                <span class="user-role" id="userRole">ผู้ใช้งาน</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Main Action Buttons -->
        <div class="main-buttons">
          <a href="attendance.html" class="btn btn-success"><i class="fas fa-clock"></i> ลงเวลา</a>
          <a href="dash.html" class="btn btn-warning"><i class="fas fa-chart-bar"></i> รายงาน</a>
          <a href="profile.html" class="btn btn-info"><i class="fas fa-user-circle"></i> โปรไฟล์</a>
        </div>
        
        <div class="divider"></div>
        
        <!-- Logout Button (อยู่ล่างสุด) -->
        <button id="logoutBtn" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = '/api';
    
    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    async function logout() {
      const token = localStorage.getItem('auth_token');
      
      if (!token) {
        showToast('ไม่มีข้อมูลการเข้าสู่ระบบ', true);
        updateUIForLogout();
        return;
      }
      
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.classList.add('loading');
        logoutBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> กำลังออกจากระบบ...';
      }
      
      try {
        const response = await fetch(`${API_BASE_URL}/user/logout`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.removeItem('auth_token');
          localStorage.removeItem('user_data');
          showToast('ออกจากระบบสำเร็จ!');
          updateUIForLogout();
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          showToast(data.message || 'ออกจากระบบไม่สำเร็จ', true);
          if (logoutBtn) {
            logoutBtn.classList.remove('loading');
            logoutBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> ออกจากระบบ';
          }
        }
      } catch (error) {
        console.error('Logout error:', error);
        showToast('เกิดข้อผิดพลาดในการติดต่อเซิร์ฟเวอร์', true);
        if (logoutBtn) {
          logoutBtn.classList.remove('loading');
          logoutBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> ออกจากระบบ';
        }
      }
    }
    
    function checkLoginStatus() {
      const token = localStorage.getItem('auth_token');
      const userDataStr = localStorage.getItem('user_data');
      
      if (token && userDataStr) {
        try {
          const userData = JSON.parse(userDataStr);
          updateUIForLogin(userData);
        } catch (e) {
          console.error('JSON parse error:', e);
          updateUIForLogout();
        }
      } else {
        updateUIForLogout();
      }
    }
    
    function updateUIForLogin(userData) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('appSection').style.display = 'block';
      
      const displayName = userData.name || `${userData.prefix || ''} ${userData.firstName || ''} ${userData.lastName || ''}`.trim() || userData.email;
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userEmail').textContent = userData.email || '';
      
      const roleMap = {
        'user': '👤 ผู้ใช้งาน',
        'admin': '👑 ผู้ดูแลระบบ',
        'manager': '📋 ผู้จัดการ'
      };
      const roleText = roleMap[userData.role] || '👤 ผู้ใช้งาน';
      document.getElementById('userRole').textContent = roleText;
      
      const avatar = document.getElementById('userAvatar');
      if (userData.picture) {
        avatar.src = userData.picture;
      } else {
        avatar.src = 'https://ui-avatars.com/api/?background=6366f1&color=fff&bold=true&name=' + encodeURIComponent(displayName);
      }
      
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        const newLogoutBtn = logoutBtn.cloneNode(true);
        logoutBtn.parentNode.replaceChild(newLogoutBtn, logoutBtn);
        newLogoutBtn.addEventListener('click', logout);
      }
    }
    
    function updateUIForLogout() {
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('appSection').style.display = 'none';
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      checkLoginStatus();
    });
  </script>
</body>
</html>
